frac{1}{(x-1)^2}$","$y' = \\frac{-1}{(x-1)^2}$"],correctAnswer:1,explanation:"Sử dụng công thức $(\\frac{u}{v})' = \\frac{u'v - uv'}{v^2}$. Ta có $y' = \\frac{1(x-1) - (x+1)1}{(x-1)^2} = \\frac{x-1-x-1}{(x-1)^2} = \\frac{-2}{(x-1)^2}$."},{id:"s1q6",type:St.MULTIPLE_CHOICE,question:"Chi phí sản xuất $x$ sản phẩm của một xí nghiệp được cho bởi hàm số $C(x) = x^2 + 20x + 100$ (đơn vị: nghìn đồng). Chi phí biên (tốc độ thay đổi chi phí) tại mức sản xuất $x = 50$ sản phẩm là:",options:["120 nghìn đồng","100 nghìn đồng","150 nghìn đồng","70 nghìn đồng"],correctAnswer:0,explanation:"Chi phí biên là đạo hàm của hàm chi phí: $C'(x) = 2x + 20$. Tại $x = 50$, ta có $C'(50) = 2(50) + 20 = 120$ nghìn đồng."},{id:"s1q7",type:St.MULTIPLE_CHOICE,question:"Đạo hàm cấp hai của hàm số $y = x^4$ là:",options:["$4x^3$","$12x^2$","$12x$","$4x$"],correctAnswer:1,explanation:"Đạo hàm cấp một: $y' = 4x^3$. Đạo hàm cấp hai: $y'' = (4x^3)' = 12x^2$."},{id:"s1q8",type:St.MULTIPLE_CHOICE,question:"Cho hàm số $f(x) = \\cos x$. Giá trị $f''(\\pi)$ bằng:",options:["0","1","-1","2"],correctAnswer:1,explanation:"Ta có $f'(x) = -\\sin x$, $f''(x) = -\\cos x$. Vậy $f''(\\pi) = -\\cos(\\pi) = -(-1) = 1$."},{id:"s1q9",type:St.MULTIPLE_CHOICE,question:"Đạo hàm của hàm số $y = e^{2x}$ là:",options:["$e^{2x}$","$2e^{2x}$","$\\frac{1}{2}e^{2x}$","$2xe^{2x-1}$"],correctAnswer:1,explanation:"Công thức $(e^u)' = u' e^u$. Với $u = 2x$, ta có $y' = 2e^{2x}$."},{id:"s1q10",type:St.MULTIPLE_CHOICE,question:"Hàm số nào sau đây có đạo hàm $y' = \\frac{1}{x}$ với $x > 0$?",options:["$y = e^x$","$y = \\ln x$","$y = x^2$","$y = \\sin x$"],correctAnswer:1,explanation:"Theo bảng đạo hàm cơ bản, $(\\ln x)' = \\frac{1}{x}$ với $x > 0$."},{id:"s1q11",type:St.MULTIPLE_CHOICE,question:"Tính đạo hàm của hàm số $y = 3^x$.",options:["$3^x$","$x \\cdot 3^{x-1}$","$3^x \\ln 3$","$\\frac{3^x}{\\ln 3}$"],correctAnswer:2,explanation:"Công thức đạo hàm hàm số mũ: $(a^x)' = a^x \\ln a$. Vậy $(3^x)' = 3^x \\ln 3$."},{id:"s1q12",type:St. ],explanation:"Câu hỏi tập trung vào đạo hàm của hàm phân thức hữu tỉ và các tính chất liên quan."},{id:"s2q3",type:St.TRUE_FALSE,question:"Xét hàm số $y = \\sin x + \\cos x$. Các khẳng định sau đúng hay sai?",statements:[{text:"a) $y' = \\cos x - \\sin x$.",isTrue:!0,explanation:"Đạo hàm của $\\sin x$ là $\\cos x$, đạo hàm của $\\cos x$ là $-\\sin x$."},{text:"b) $y'' = -(\\sin x + \\cos x)$.",isTrue:!0,explanation:"Ta có $y'' = (\\cos x - \\sin x)' = -\\sin x - \\cos x = -(\\sin x + \\cos x)$."},{text:"c) $y'' + y = 0$.",isTrue:!0,explanation:"Thay $y'' = -y$ vào ta được $-y + y = 0$. Đây là một hệ thức đúng."},{text:"d) $y'(0) = 0$.",isTrue:!1,explanation:"Thay $x = 0$ vào $y' = \\cos x - \\sin x$, ta được $y'(0) = \\cos 0 - \\sin 0 = 1 - 0 = 1$."}],explanation:"Kiểm tra đạo hàm các hàm lượng giác cơ bản và mối liên hệ giữa hàm số và đạo hàm cấp hai."},{id:"s2q4",type:St.TRUE_FALSE,question:"Nồng độ của một loại hóa chất trong phản ứng hóa học sau thời gian $t$ (phút) được xác định bởi hàm số $C(t) = -t^2 + 6t + 10$ (đơn vị: mg/l).",statements:[{text:"a) Tốc độ phản ứng tại thời điểm $t$ là $v(t) = -2t + 6$.",isTrue:!0,explanation:"Tốc độ phản ứng là đạo hàm của hàm nồng độ theo thời gian: $C'(t) = -2t + 6$."},{text:"b) Tại thời điểm $t = 3$ phút, tốc độ phản ứng bằng 0.",isTrue:!0,explanation:"Thay $t = 3$ vào $v(t)$, ta được $v(3) = -2(3) + 6 = 0$."},{text:"c) Nồng độ hóa chất đạt giá trị lớn nhất tại thời điểm $t = 3$ phút.",isTrue:!0,explanation:"Vì đạo hàm $C'(3) = 0$ và đổi dấu từ dương sang âm qua $t=3$, nên hàm số đạt cực đại tại đó."},{text:"d) Tốc độ phản ứng tại thời điểm $t = 1$ phút là $5$ mg/l/phút.",isTrue:!1,explanation:"Tại $t = 1$, $v(1) = -2(1) + 6 = 4$ mg/l/phút. Khẳng định bằng 5 là sai."}],explanation:"Ứng dụng đạo hàm trong hóa học để xác định tốc độ phản ứng và nồng độ tối ưu."},{id:"s3q1",type:St.SHORT_ANSWER,question:"Cho hàm số $f(x) = x^2 + 2x$. Tính giá trị của $f'(1,5)$.",correctAnswer:"5",roundingInstruction:"Nhập số nguyên hoặc số
